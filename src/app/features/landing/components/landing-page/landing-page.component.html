<!-- ===================== MAIN CONTENT ===================== -->
<main class="portal-content">
  <p class="portal-subtitle">Kindly select an account management service</p>

  <!-- 3-column service cards grid -->
  <div class="cards-grid" role="list" aria-label="Account management services">
    @for (card of services(); track card.id) {
      <div role="listitem">
        <app-service-card [card]="card" />
      </div>
    }
  </div>
</main>

<!-- ===================== FOOTER ===================== -->
<footer class="portal-footer" aria-label="Site footer">
  <img
    src="assets/img/footer.png"
    alt="First Bank footer — links for Banking, Security, Contact Us and Legal"
    class="footer-img" />
</footer>
