<header class="portal-header">
  <div class="header-inner">

    <!-- Logo -->
    <a href="/" class="header-logo" aria-label="First Bank Home">
      <img src="assets/icons/logo.svg" alt="First Bank Logo" class="logo-img" />
    </a>

    <!-- Right side controls -->
    <div class="header-controls">

      <!-- DEFAULT STATE: open account link + search icon -->
      @if (!searchActive) {
        <a class="open-account-link" href="#" aria-label="Open a FirstBank account">
          Open a FirstBank account
        </a>

        <button
          class="search-icon-btn"
          aria-label="Toggle search"
          (click)="onSearchIconClick()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 21L15 15M3 10C3 10.9193 3.18106 11.8295 3.53284 12.6788C3.88463 13.5281 4.40024 14.2997 5.05025 14.9497C5.70026 15.5998 6.47194 16.1154 7.32122 16.4672C8.1705 16.8189 9.08075 17 10 17C10.9193 17 11.8295 16.8189 12.6788 16.4672C13.5281 16.1154 14.2997 15.5998 14.9497 14.9497C15.5998 14.2997 16.1154 13.5281 16.4672 12.6788C16.8189 11.8295 17 10.9193 17 10C17 9.08075 16.8189 8.1705 16.4672 7.32122C16.1154 6.47194 15.5998 5.70026 14.9497 5.05025C14.2997 4.40024 13.5281 3.88463 12.6788 3.53284C11.8295 3.18106 10.9193 3 10 3C9.08075 3 8.1705 3.18106 7.32122 3.53284C6.47194 3.88463 5.70026 4.40024 5.05025 5.05025C4.40024 5.70026 3.88463 6.47194 3.53284 7.32122C3.18106 8.1705 3 9.08075 3 10Z" stroke="#1855F5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      }

      <!-- SEARCH ACTIVE STATE: expanded search input -->
      @if (searchActive) {
        <div class="search-input-wrapper">
          <input
            type="text"
            class="search-input"
            placeholder="Search..."
            [(ngModel)]="searchQuery"
            (keydown)="onSearchKeydown($event)"
            autofocus
            aria-label="Search" />
          <button class="search-submit-btn" aria-label="Search" (click)="onSearchClose()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 21L15 15M3 10C3 10.9193 3.18106 11.8295 3.53284 12.6788C3.88463 13.5281 4.40024 14.2997 5.05025 14.9497C5.70026 15.5998 6.47194 16.1154 7.32122 16.4672C8.1705 16.8189 9.08075 17 10 17C10.9193 17 11.8295 16.8189 12.6788 16.4672C13.5281 16.1154 14.2997 15.5998 14.9497 14.9497C15.5998 14.2997 16.1154 13.5281 16.4672 12.6788C16.8189 11.8295 17 10.9193 17 10C17 9.08075 16.8189 8.1705 16.4672 7.32122C16.1154 6.47194 15.5998 5.70026 14.9497 5.05025C14.2997 4.40024 13.5281 3.88463 12.6788 3.53284C11.8295 3.18106 10.9193 3 10 3C9.08075 3 8.1705 3.18106 7.32122 3.53284C6.47194 3.88463 5.70026 4.40024 5.05025 5.05025C4.40024 5.70026 3.88463 6.47194 3.53284 7.32122C3.18106 8.1705 3 9.08075 3 10Z" stroke="#1855F5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      }

      <!-- Help button (always visible) -->
      <button class="help-btn" aria-label="Get help">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" stroke="#002855" stroke-width="1.5"/>
          <path d="M10 14v-1M10 11a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" stroke="#002855" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Help</span>
      </button>

    </div>
  </div>
</header>
